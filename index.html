<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="LIVE LOG" />
  <meta name="theme-color" content="#050505" />
  <title>🎸 LIVE LOG</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      background: #050505;
      color: #e0e0e0
    }

    body {
      font-family: 'Inter', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale
    }

    input,
    textarea,
    button,
    select {
      font-family: inherit
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7)
    }

    ::-webkit-scrollbar {
      width: 3px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px
    }

    input,
    textarea {
      -webkit-appearance: none
    }

    /* ── Minimal Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes countPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.02); }
      100% { transform: scale(1); }
    }

    /* ── Smooth transitions for interactive elements ── */
    button { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
    button:active { transform: scale(0.97); }
    input, textarea { transition: border-color 0.2s ease, box-shadow 0.2s ease; }
    input:focus, textarea:focus {
      border-color: rgba(96,165,250,0.4) !important;
      box-shadow: 0 0 0 2px rgba(96,165,250,0.1) !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script>
    'use strict';
    var _React = React;
    var useState = _React.useState;
    var useEffect = _React.useEffect;
    var useCallback = _React.useCallback;
    var useRef = _React.useRef;
    var h = _React.createElement;

    var STORAGE_KEY = 'livelog-v3';
    var IDB_NAME = 'livelog-images';
    var IDB_STORE = 'photos';
    var IDB_VER = 1;

    function uid() { return Date.now() + Math.random(); }
    function emptyArtist() { return { id: uid(), name: '', memo: '' }; }
    function emptyEvent() {
      return {
        id: uid(), date: new Date().toISOString().slice(0, 10),
        openTime: '', startTime: '',
        venue: '', title: '', ticket: '', drink: '600', goods: '0',
        artists: [emptyArtist()], note: '', flyer: null, signboard: null, setlist: null,
        bestAct: '', coverType: 'signboard'
      };
    }

    /* 画像を最大900px・JPEG 0.72 に圧縮してからbase64化 */
    function compressImg(file) {
      return new Promise(function (res, rej) {
        var reader = new FileReader();
        reader.onerror = rej;
        reader.onload = function (e) {
          var img = new Image();
          img.onerror = rej;
          img.onload = function () {
            var MAX = 900;
            var w = img.width, hh = img.height;
            if (w > MAX || hh > MAX) {
              if (w > hh) { hh = Math.round(hh * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / hh); hh = MAX; }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = hh;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, hh);
            res(canvas.toDataURL('image/jpeg', 0.72));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    /* ── IndexedDB: 画像データ専用ストレージ ── */
    var _idbPromise = null;
    function openIDB() {
      if (_idbPromise) return _idbPromise;
      _idbPromise = new Promise(function (res, rej) {
        var req = indexedDB.open(IDB_NAME, IDB_VER);
        req.onupgradeneeded = function (e) {
          e.target.result.createObjectStore(IDB_STORE);
        };
        req.onsuccess = function (e) { res(e.target.result); };
        req.onerror = function (e) { rej(e.target.error); };
      });
      return _idbPromise;
    }
    function idbPut(key, value) {
      return openIDB().then(function (db) {
        return new Promise(function (res, rej) {
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var st = tx.objectStore(IDB_STORE);
          var req = st.put(value, key);
          req.onsuccess = function () { res(); };
          req.onerror = function (e) { rej(e.target.error); };
        });
      });
    }
    function idbGet(key) {
      return openIDB().then(function (db) {
        return new Promise(function (res, rej) {
          var tx = db.transaction(IDB_STORE, 'readonly');
          var st = tx.objectStore(IDB_STORE);
          var req = st.get(key);
          req.onsuccess = function () { res(req.result || null); };
          req.onerror = function (e) { rej(e.target.error); };
        });
      });
    }
    function idbDel(key) {
      return openIDB().then(function (db) {
        return new Promise(function (res, rej) {
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var st = tx.objectStore(IDB_STORE);
          st.delete(key); tx.oncomplete = res;
        });
      });
    }
    /* イベントの写真をIDBに保存し、イベントオブジェクトからは除去して返す */
    function savePhotosToIDB(ev) {
      var keys = ['flyer', 'signboard', 'setlist'];
      var promises = keys.map(function (k) {
        var data = ev[k];
        var idbKey = k + '_' + ev.id;
        if (data) return idbPut(idbKey, data);
        return Promise.resolve();
      });
      return Promise.all(promises).then(function () {
        var cleaned = Object.assign({}, ev);
        keys.forEach(function (k) { cleaned[k] = null; });
        return cleaned;
      });
    }
    /* IDBから写真を削除 */
    function deletePhotosFromIDB(evId) {
      return Promise.all([idbDel('flyer_' + evId), idbDel('signboard_' + evId), idbDel('setlist_' + evId)]);
    }
    /* 旧データの移行: イベントのflyer/signboardがbase64文字列ならIDBへ移す */
    function migrateOldPhotos(events) {
      var needsMigration = events.some(function (ev) {
        return (typeof ev.flyer === 'string' && ev.flyer.startsWith('data:')) ||
          (typeof ev.signboard === 'string' && ev.signboard.startsWith('data:'));
      });
      if (!needsMigration) return Promise.resolve(events);
      var migrated = [];
      var promises = events.map(function (ev) {
        return savePhotosToIDB(ev).then(function (cleaned) {
          migrated.push(cleaned);
        });
      });
      return Promise.all(promises).then(function () {
        // 移行後はlocalStorageを更新
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated)); } catch (e) { }
        return migrated;
      });
    }

    /* ── localStorage auto-save (写真なしデータのみ) ── */
    function useStorage() {
      var s1 = useState([]); var events = s1[0]; var setEvents = s1[1];
      var s2 = useState(false); var loaded = s2[0]; var setLoaded = s2[1];
      var s3 = useState('idle'); var status = s3[0]; var setStatus = s3[1];
      var s4 = useState({}); var vMeta = s4[0]; var setVMeta = s4[1];
      var timer = useRef(null);
      useEffect(function () {
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          var vm = localStorage.getItem('livelog-venues');
          if (vm) setVMeta(JSON.parse(vm));
          if (raw) {
            var parsed = JSON.parse(raw);
            migrateOldPhotos(parsed).then(function (evs) {
              setEvents(evs); setLoaded(true);
            });
          } else { setLoaded(true); }
        } catch (e) { setLoaded(true); }
      }, []);
      useEffect(function () {
        if (!loaded) return;
        setStatus('saving');
        clearTimeout(timer.current);
        timer.current = setTimeout(function () {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
            localStorage.setItem('livelog-venues', JSON.stringify(vMeta));
            setStatus('saved');
            setTimeout(function () { setStatus('idle'); }, 2200);
          } catch (e) { setStatus('error'); }
        }, 300);
      }, [events, vMeta, loaded]);
      var save = useCallback(function (ev, vm) {
        if (typeof ev === 'function') setEvents(ev); else if (ev) setEvents(ev);
        if (typeof vm === 'function') setVMeta(vm); else if (vm) setVMeta(vm);
      }, []);
      return { events: events, vMeta: vMeta, save: save, loaded: loaded, status: status };
    }

    /* ── backup: IDB写真も含めてエクスポート ── */
    function doExport(events) {
      // 各イベントの写真をIDBから取得してJSONに含める
      var promises = events.map(function (ev) {
        return Promise.all([
          idbGet('flyer_' + ev.id),
          idbGet('signboard_' + ev.id),
          idbGet('setlist_' + ev.id)
        ]).then(function (imgs) {
          return Object.assign({}, ev, { flyer: imgs[0], signboard: imgs[1], setlist: imgs[2] });
        });
      });
      Promise.all(promises).then(function (full) {
        var blob = new Blob([JSON.stringify(full, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url; a.download = 'livelog-' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
        URL.revokeObjectURL(url);
      });
    }
    function doImport(file, cb) {
      var r = new FileReader(); r.onload = function (e) {
        try { var d = JSON.parse(e.target.result); Array.isArray(d) ? cb(d) : alert('不正なファイル形式'); }
        catch (e2) { alert('読み込み失敗'); }
      }; r.readAsText(file);
    }

    /* ── アーティスト画像取得: 複数API フォールバック方式 ── */
    /* 優先順位: Spotify → Deezer → iTunes → Wikipedia(ja) → Wikipedia(en) → MusicBrainz+Wikidata */
    var imgCache = new Map();
    var _cbIdx = 0;

    /* ── Spotify トークンキャッシュ ── */
    var _spotifyToken = null;   /* { token: string, expiresAt: number } */

    function getSpotifyCredentials() {
      try {
        var raw = localStorage.getItem('livelog-spotify');
        return raw ? JSON.parse(raw) : null;
      } catch (e) { return null; }
    }

    function saveSpotifyCredentials(clientId, clientSecret) {
      try {
        localStorage.setItem('livelog-spotify', JSON.stringify({ clientId: clientId, clientSecret: clientSecret }));
      } catch (e) {}
    }

    function clearSpotifyCredentials() {
      try { localStorage.removeItem('livelog-spotify'); } catch (e) {}
      _spotifyToken = null;
    }

    /* Spotify アクセストークン取得 (Client Credentials flow) */
    function getSpotifyToken() {
      var creds = getSpotifyCredentials();
      if (!creds || !creds.clientId || !creds.clientSecret) return Promise.resolve(null);
      /* キャッシュが有効な間は再取得しない (60秒マージン) */
      if (_spotifyToken && _spotifyToken.expiresAt > Date.now() + 60000) {
        return Promise.resolve(_spotifyToken.token);
      }
      var b64 = btoa(creds.clientId + ':' + creds.clientSecret);
      return fetch('https://accounts.spotify.com/api/token', {
        method: 'POST',
        headers: {
          'Authorization': 'Basic ' + b64,
          'Content-Type': 'application/x-www-form-urlencoded'
        },
        body: 'grant_type=client_credentials'
      }).then(function (r) {
        if (!r.ok) return null;
        return r.json();
      }).then(function (data) {
        if (!data || !data.access_token) return null;
        _spotifyToken = { token: data.access_token, expiresAt: Date.now() + (data.expires_in || 3600) * 1000 };
        return _spotifyToken.token;
      }).catch(function () { return null; });
    }

    /* Spotify アーティスト画像検索 */
    function fetchSpotifyArtistImage(name) {
      return getSpotifyToken().then(function (token) {
        if (!token) return null;
        var url = 'https://api.spotify.com/v1/search?q=' + encodeURIComponent(name) +
          '&type=artist&market=JP&limit=5';
        return fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
          .then(function (r) { return r.ok ? r.json() : null; })
          .then(function (data) {
            if (!data || !data.artists || !data.artists.items || data.artists.items.length === 0) return null;
            /* 名前が最も一致するアーティストを選ぶ */
            var items = data.artists.items;
            var matched = items.find(function (a) { return isNameMatch(a.name, name); });
            var artist = matched || items[0];
            if (!artist || !artist.images || artist.images.length === 0) return null;
            /* Spotify は images を大きい順に返すので先頭が最高画質 */
            return artist.images[0].url;
          });
      }).catch(function () { return null; });
    }

    /* 名前マッチング (共通ユーティリティ) */
    function isNameMatch(a, b) {
      if (!a || !b) return false;
      var ac = a.toLowerCase().replace(/[^a-z0-9\u3040-\u9fff]/g, '');
      var bc = b.toLowerCase().replace(/[^a-z0-9\u3040-\u9fff]/g, '');
      return ac === bc || ac.includes(bc) || bc.includes(ac);
    }

    /* ── 1. Deezer JSONP ── */
    function deezerJSONP(name) {
      return new Promise(function (res, rej) {
        var cbName = '__dzcb' + (_cbIdx++);
        var el = document.createElement('script');
        var done = false;
        var finish = function (fn) {
          if (done) return; done = true;
          try { delete window[cbName]; } catch (e) { }
          if (el.parentNode) el.parentNode.removeChild(el);
          fn();
        };
        window[cbName] = function (data) { finish(function () { res(data); }); };
        el.onerror = function () { finish(function () { rej(new Error('load')); }); };
        setTimeout(function () { finish(function () { rej(new Error('timeout')); }); }, 8000);
        el.src = 'https://api.deezer.com/search/artist?q=' + encodeURIComponent(name) + '&output=jsonp&limit=1&callback=' + cbName;
        document.head.appendChild(el);
      });
    }

    /* ── 2. iTunes JSONP ── */
    function itunesJSONP(term, entity) {
      return new Promise(function (res, rej) {
        var cbName = '__itcb' + (_cbIdx++);
        var el = document.createElement('script');
        var done = false;
        var finish = function (fn) {
          if (done) return; done = true;
          try { delete window[cbName]; } catch (e) { }
          if (el.parentNode) el.parentNode.removeChild(el);
          fn();
        };
        window[cbName] = function (data) { finish(function () { res(data); }); };
        el.onerror = function () { finish(function () { rej(new Error('load')); }); };
        setTimeout(function () { finish(function () { rej(new Error('timeout')); }); }, 8000);
        el.src = 'https://itunes.apple.com/search?term=' + encodeURIComponent(term) +
          '&media=music&entity=' + (entity || 'album') + '&limit=1&country=jp&callback=' + cbName;
        document.head.appendChild(el);
      });
    }

    /* ── 3. Wikipedia REST API (サムネイル取得) ── */
    function fetchWikipediaImage(title, lang) {
      var host = (lang || 'ja') + '.wikipedia.org';
      var url = 'https://' + host + '/api/rest_v1/page/summary/' + encodeURIComponent(title);
      return fetch(url).then(function (r) {
        if (!r.ok) return null;
        return r.json();
      }).then(function (data) {
        if (!data) return null;
        /* originalimage (高解像度) を優先、なければ thumbnail */
        if (data.originalimage && data.originalimage.source) return data.originalimage.source;
        if (data.thumbnail && data.thumbnail.source) return data.thumbnail.source;
        return null;
      }).catch(function () { return null; });
    }

    /* Wikipedia検索: 正確なページ名が分からない場合に候補を取得 */
    function searchWikipedia(name, lang) {
      var host = (lang || 'ja') + '.wikipedia.org';
      var suffix = lang === 'en'
        ? ' band OR singer OR musician'
        : ' バンド OR 歌手 OR ミュージシャン';
      var url = 'https://' + host + '/w/api.php?action=query&list=search&srsearch=' +
        encodeURIComponent(name + suffix) +
        '&srnamespace=0&srlimit=3&format=json&origin=*';
      return fetch(url).then(function (r) {
        if (!r.ok) return [];
        return r.json();
      }).then(function (data) {
        if (!data || !data.query || !data.query.search) return [];
        return data.query.search.map(function (s) { return s.title; });
      }).catch(function () { return []; });
    }

    /* Wikipedia フロー: 直接アクセス → 見つからなければ検索して候補を試す */
    function tryWikipedia(name, lang) {
      return fetchWikipediaImage(name, lang).then(function (img) {
        if (img) return img;
        return searchWikipedia(name, lang).then(function (titles) {
          if (titles.length === 0) return null;
          /* 候補を順番に試す (最大3件) */
          var chain = Promise.resolve(null);
          titles.forEach(function (title) {
            chain = chain.then(function (found) {
              if (found) return found;
              return fetchWikipediaImage(title, lang);
            });
          });
          return chain;
        });
      });
    }

    /* ── 4. MusicBrainz → Wikidata → Wikimedia Commons ── */
    function fetchMusicBrainzImage(name) {
      var url = 'https://musicbrainz.org/ws/2/artist/?query=artist:' +
        encodeURIComponent(name) + '&fmt=json&limit=1';
      return fetch(url, { headers: { 'User-Agent': 'LiveLogApp/1.0' } }).then(function (r) {
        if (!r.ok) return null;
        return r.json();
      }).then(function (data) {
        if (!data || !data.artists || data.artists.length === 0) return null;
        var artist = data.artists[0];
        /* 名前一致チェック */
        if (!isNameMatch(artist.name, name) &&
            !(artist['sort-name'] && isNameMatch(artist['sort-name'], name))) return null;
        var mbid = artist.id;
        /* URL relations から Wikidata ID を取得 */
        return fetch('https://musicbrainz.org/ws/2/artist/' + mbid + '?inc=url-rels&fmt=json',
          { headers: { 'User-Agent': 'LiveLogApp/1.0' } }
        ).then(function (r2) {
          if (!r2.ok) return null;
          return r2.json();
        }).then(function (detail) {
          if (!detail || !detail.relations) return null;
          var wdRel = detail.relations.find(function (r) {
            return r.type === 'wikidata' && r.url && r.url.resource;
          });
          if (!wdRel) return null;
          var wdId = wdRel.url.resource.split('/').pop();
          /* Wikidata から画像 (P18) を取得 */
          return fetch('https://www.wikidata.org/w/api.php?action=wbgetentities&ids=' +
            wdId + '&props=claims&format=json&origin=*'
          ).then(function (r3) {
            if (!r3.ok) return null;
            return r3.json();
          }).then(function (wd) {
            if (!wd || !wd.entities || !wd.entities[wdId]) return null;
            var claims = wd.entities[wdId].claims;
            if (!claims.P18 || claims.P18.length === 0) return null;
            var fileName = claims.P18[0].mainsnak.datavalue.value;
            /* Wikimedia Commons の画像URLを取得 */
            return fetch('https://commons.wikimedia.org/w/api.php?action=query&titles=File:' +
              encodeURIComponent(fileName) + '&prop=imageinfo&iiprop=url&iiurlwidth=800&format=json&origin=*'
            ).then(function (r4) {
              if (!r4.ok) return null;
              return r4.json();
            }).then(function (commons) {
              if (!commons || !commons.query || !commons.query.pages) return null;
              var pages = commons.query.pages;
              var pageId = Object.keys(pages)[0];
              if (pageId === '-1') return null;
              var ii = pages[pageId].imageinfo;
              if (!ii || ii.length === 0) return null;
              return ii[0].thumburl || ii[0].url || null;
            });
          });
        });
      }).catch(function () { return null; });
    }

    /* ── メイン: 複数APIフォールバック (Spotify→Deezer→iTunes→Wikipedia→MusicBrainz) ── */
    function fetchArtistImage(name) {
      /* resolve(null) をベースにして .then() チェーンで順番に試す */
      return Promise.resolve(null)
        /* Step 0: Spotify (認証情報が設定されていれば最優先) */
        .then(function () { return fetchSpotifyArtistImage(name); })
        /* Step 1: Deezer (アーティスト写真) */
        .then(function (img) {
          if (img) return img;
          return deezerJSONP(name).then(function (d) {
            var res = d.data && d.data[0];
            if (res && isNameMatch(res.name, name)) {
              if (res.picture_xl) return res.picture_xl;
              if (res.picture_big) return res.picture_big;
            }
            return null;
          }).catch(function () { return null; });
        })
        /* Step 2: iTunes (アルバムアート) */
        .then(function (img) {
          if (img) return img;
          return itunesJSONP(name, 'album').then(function (d) {
            var res = d.results && d.results[0];
            if (res && isNameMatch(res.artistName, name) && res.artworkUrl100) {
              return res.artworkUrl100.replace('100x100bb', '1000x1000bb');
            }
            return null;
          }).catch(function () { return null; });
        })
        /* Step 3: Wikipedia (日本語) */
        .then(function (img) {
          if (img) return img;
          return tryWikipedia(name, 'ja');
        })
        /* Step 4: Wikipedia (英語) */
        .then(function (img) {
          if (img) return img;
          return tryWikipedia(name, 'en');
        })
        /* Step 5: MusicBrainz → Wikidata → Wikimedia Commons */
        .then(function (img) {
          if (img) return img;
          return fetchMusicBrainzImage(name);
        })
        .catch(function () { return null; });

                displaying.length === 0 ? h('div', { style: { textAlign: 'center', padding: '80px 20px', color: '#444' } },
                  h('div', { style: { fontSize: 48, marginBottom: 16 } }, '🎤'),
                  h('div', { style: { fontSize: 16, marginBottom: 8, color: '#555' } }, 'まだ' + (viewTab === 'past' ? '記録' : '予定') + 'がありません')) :
                  h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14 } },
                    displaying.map(function (ev) {
                      var d = new Date(ev.date);
                      var mo = d.toLocaleDateString('ja-JP', { month: 'short' });
                      var dy = d.getDate();
                      return h(EventGridCard, { key: ev.id, ev: ev, mo: mo, dy: dy, onEdit: function (ev) { setEditEv(ev); setShowForm(true); }, onDelete: function (id) { save(events.filter(function (e) { return e.id !== id; })); } });
                    }))),

            showForm && h(EventModal, { initial: editEv, onSave: handleSave, onClose: function () { setShowForm(false); setEditEv(null); }, venues: venues, artistNames: artNames, vMeta: vMeta, onSaveVMeta: function (vm) { save(null, vm); } }),
            showRank && h(RankingModal, { events: events, onClose: function () { setShowRank(false); }, vMeta: vMeta }),
            showBk && h(BackupModal, { events: events, onImport: save, onClose: function () { setShowBk(false); } })
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>

</html>
