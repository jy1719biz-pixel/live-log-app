  <script>
    'use strict';
    var _React = React;

    var STORAGE_KEY = 'livelog-v3';

    var IDB_STORE = 'photos';
    var IDB_VER = 1;

    function uid() { return Date.now() + Math.random(); }
    function emptyArtist() { return { id: uid(), name: '', memo: '' }; }
    function emptyEvent() {
      return {
        id: uid(), date: new Date().toISOString().slice(0, 10),

    }

    /* 画像を最大900px・JPEG 0.72 に圧縮してからbase64化 */
    function compressImg(file) {
      return new Promise(function (res, rej) {
        var reader = new FileReader();
        reader.onerror = rej;
        reader.onload = function (e) {
          var img = new Image();
          img.onerror = rej;
          img.onload = function () {
            var MAX = 900;
            var w = img.width, hh = img.height;
            if (w > MAX || hh > MAX) {
              if (w > hh) { hh = Math.round(hh * MAX / w); w = MAX; }
              else { w = Math.round(w * MAX / hh); hh = MAX; }
            }
            var canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = hh;
            var ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, hh);
            res(canvas.toDataURL('image/jpeg', 0.72));
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      });
    }

    /* ── IndexedDB: 画像データ専用ストレージ ── */
    var _idbPromise = null;

        req.onupgradeneeded = function (e) {
          e.target.result.createObjectStore(IDB_STORE);

        req.onsuccess = function (e) { res(e.target.result); };
        req.onerror = function (e) { rej(e.target.error); };
      });
      return _idbPromise;
    }
    function idbPut(key, value) {
      return openIDB().then(function (db) {
        return new Promise(function (res, rej) {
          var tx = db.transaction(IDB_STORE, 'readwrite');
          var st = tx.objectStore(IDB_STORE);
          var req = st.put(value, key);
          req.onsuccess = function () { res(); };
          req.onerror = function (e) { rej(e.target.error); };

      });
    }
    function idbGet(key) {

          var st = tx.objectStore(IDB_STORE);

          req.onsuccess = function () { res(req.result || null); };
          req.onerror = function (e) { rej(e.target.error); };

      });
    }
    function idbDel(key) {
      return openIDB().then(function (db) {
        return new Promise(function (res, rej) {

        });

    }
    /* イベントの写真をIDBに保存し、イベントオブジェクトからは除去して返す */
    function savePhotosToIDB(ev) {
      var promises = [];
      var evClean = Object.assign({}, ev);
      ['flyer', 'signboard'].forEach(function (field) {
        var val = ev[field];
        if (val) {
          promises.push(idbPut(field + '_' + ev.id, val));
          evClean[field] = null; // localStorageには保存しない
        } else {
          promises.push(idbDel(field + '_' + ev.id));
          evClean[field] = null;
        }
      });
      return Promise.all(promises).then(function () { return evClean; });
    }
    /* IDBから写真を削除 */
    function deletePhotosFromIDB(eventId) {
      return Promise.all([
        idbDel('flyer_' + eventId),
        idbDel('signboard_' + eventId)
      ]);
    }
    /* 旧データの移行: イベントのflyer/signboardがbase64文字列ならIDBへ移す */
    function migrateOldPhotos(events) {
      var needsMigration = events.some(function (ev) {
        return (typeof ev.flyer === 'string' && ev.flyer.startsWith('data:')) ||
          (typeof ev.signboard === 'string' && ev.signboard.startsWith('data:'));
      });
      if (!needsMigration) return Promise.resolve(events);
      var migrated = [];
      var promises = events.map(function (ev) {
        return savePhotosToIDB(ev).then(function (cleaned) {
          migrated.push(cleaned);
        });
      });
      return Promise.all(promises).then(function () {
        // 移行後はlocalStorageを更新
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated)); } catch (e) { }
        return migrated;
      });
    }

    /* ── localStorage auto-save (写真なしデータのみ) ── */
    function useStorage() {
      var s1 = useState([]); var events = s1[0]; var setEvents = s1[1];

        try {

          var vm = localStorage.getItem('livelog-venues');
          if (vm) setVMeta(JSON.parse(vm));
          if (raw) {
            var parsed = JSON.parse(raw);
            migrateOldPhotos(parsed).then(function (evs) {
              setEvents(evs); setLoaded(true);

          } else { setLoaded(true); }
        } catch (e) { setLoaded(true); }
      }, []);
      useEffect(function () {
        if (!loaded) return;
        setStatus('saving');
        clearTimeout(timer.current);
        timer.current = setTimeout(function () {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(events));
            localStorage.setItem('livelog-venues', JSON.stringify(vMeta));
            setStatus('saved');
            setTimeout(function () { setStatus('idle'); }, 2200);
          } catch (e) { setStatus('error'); }
        }, 300);
      }, [events, vMeta, loaded]);
      var save = useCallback(function (ev, vm) {
        if (typeof ev === 'function') setEvents(ev); else if (ev) setEvents(ev);
        if (typeof vm === 'function') setVMeta(vm); else if (vm) setVMeta(vm);
      }, []);
      return { events: events, vMeta: vMeta, save: save, loaded: loaded, status: status };
    }

    /* ── backup: IDB写真も含めてエクスポート ── */
    function doExport(events) {

      var promises = events.map(function (ev) {
        return Promise.all([
          idbGet('flyer_' + ev.id),
          idbGet('signboard_' + ev.id)

          return Object.assign({}, ev, { flyer: imgs[0], signboard: imgs[1] });

        a.href = url; a.download = 'livelog-' + new Date().toISOString().slice(0, 10) + '.json'; a.click();
        URL.revokeObjectURL(url);

    }

    }

    function deezerJSONP(name) {

        document.head.appendChild(el);

    }
    function fetchArtistImage(name) {
      /* まずはDeezerでアーティスト写真（肖像）を探す */
      return deezerJSONP(name).then(function (d) {
        var res = d.data && d.data[0];
        if (res && res.picture_big) return res.picture_big;
        /* Deezerで見つからなければiTunesでアルバムアートを探す（フォールバック） */
        return itunesJSONP(name, 'album').then(function (d2) {
          var res2 = d2.results && d2.results[0];
          if (res2 && res2.artworkUrl100) return res2.artworkUrl100.replace('100x100bb', '600x600bb');

            var res3 = d3.results && d3.results[0];
            return (res3 && res3.artworkUrl100) ? res3.artworkUrl100.replace('100x100bb', '600x600bb') : null;
          });
        });
      }).catch(function () { return null; });
    }
    function useArtistImg(name) {
      var s = useState(function () { return imgCache.has(name) ? imgCache.get(name) : null; }); var url = s[0]; var setUrl = s[1];
      useEffect(function () {
        if (!name || name.length < 2) return;
        if (imgCache.has(name)) { setUrl(imgCache.get(name)); return; }
        var cancelled = false;
        var t = setTimeout(function () {

            .then(function (img) {

    }
